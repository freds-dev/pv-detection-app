<!DOCTYPE html>
<html>
  <head>
    <title>Interactive PV Predictor</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"
    />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: Arial, sans-serif;
      }
      #map {
        width: 100%;
        height: 100%;
      }
      /* Style for the loading spinner */
      .loader {
        border: 5px solid #f3f3f3;
        border-top: 5px solid #3498db;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: auto;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      .leaflet-popup-content-wrapper {
        border-radius: 5px;
      }
      .leaflet-popup-content {
        text-align: center;
      }
      /* Removed the old run-prediction-btn styles, added style for the permanent one */
      #persistent-run-prediction-btn {
        border: none;
        padding: 8px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        transition: background-color 0.3s;
      }

      #loader-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.6);
        z-index: 10000;
        display: none;
        justify-content: center;
        align-items: center;
      }
      .loader-box {
        background: white;
        padding: 25px 40px;
        border-radius: 10px;
        text-align: center;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }
      #loader-text {
        font-weight: bold;
        font-size: 1.1em;
        margin-top: 15px;
      }
      .leaflet-overlay-pixelated {
        /* This is the magic property for modern browsers */
        image-rendering: pixelated;
        /* Fallback for Firefox */
        image-rendering: -moz-crisp-edges;
      }
    </style>
  </head>
  <body data-config='{{ config|tojson|safe }}''>
    <div id="loader-overlay">
      <div class="loader-box">
        <div class="loader"></div>
        <div id="loader-text">Running prediction...</div>
      </div>
    </div>

    <div id="map"></div>

    <script>
    // --- Pass Config from Flask ---
    const configJson = document.body.dataset.config;
    const APP_CONFIG = JSON.parse(configJson);

    // --- Map Initialization ---
    const map = L.map("map").setView([51.9607, 7.6261], 14);

    // --- Basemap Layers ---
    const osm = L.tileLayer(
        "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        {
            attribution:
                '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        }
    );

    const light = L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
        {
            attribution:
                '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
        }
    );

    const googleSatellite = L.tileLayer(
        "https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}",
        {
            attribution: "Google",
            name: "Google Satellite",
        }
    ).addTo(map); // Default

    const basemaps = {
        "Google Satellite": googleSatellite,
        OpenStreetMap: osm,
        "Light Basemap": light,
    };

    if (
        APP_CONFIG.planet_api_key &&
        APP_CONFIG.planet_api_key !== "YOUR_PLANET_API_KEY_HERE"
    ) {
        const planetTilesUrl = `https://tiles.planet.com/basemaps/v1/planet-tiles/global_monthly_2025_08_mosaic/gmap/{z}/{x}/{y}.png?api_key=${APP_CONFIG.planet_api_key}`;
        const planet = L.tileLayer(planetTilesUrl, {
            attribution: "Planet Labs",
        });
        basemaps["Planet Monthly"] = planet;
    }

    // --- Layer Control ---
    const overlayLayers = {};
    let layerControl = L.control
        .layers(basemaps, overlayLayers, {
            collapsed: false,
        })
        .addTo(map);

    // --- Geocoding Search ---
    L.Control.geocoder({
        defaultMarkGeocode: false,
    })
        .on("markgeocode", function (e) {
            const latlng = e.geocode.center;
            map.setView(latlng, 18);
            // When searching, we treat it as a single selection
            handleMapInteraction(latlng, false);
        })
        .addTo(map);

    // --- Global State Variables for MULTI-SELECTION ---
    let selectedBuildingGeoJSONs = []; // Array to hold all selected GeoJSON features
    let buildingMarkers = L.featureGroup().addTo(map); // A layer group for all selected building polygons

    // NEW: Object to hold the master LayerGroup for each type (e.g., pv_probability, dissimilarity_index)
    let predictionLayerGroups = {};
    let currentPredictionLayerControlEntries = [];

    // --- Abort Controllers for canceling requests ---
    let findBuildingController = new AbortController();
    let runPredictionController = new AbortController();

    // --- Persistent Control Button ---
    const predictionControl = L.control({ position: "topright" });

    predictionControl.onAdd = function (map) {
        const div = L.DomUtil.create("div", "leaflet-bar leaflet-control");
        div.innerHTML = `
            <button id="persistent-run-prediction-btn" style="background-color: #ccc;" disabled>
                Run 0 Predictions
            </button>
        `;
        // Prevent map click propagation on the button
        L.DomEvent.disableClickPropagation(div);
        // Bind the new prediction function
        L.DomEvent.on(div.querySelector("button"), "click", runAllPredictions);
        return div;
    };
    predictionControl.addTo(map);

    // Function to update the button state
    function updatePredictionButton() {
        const btn = document.getElementById("persistent-run-prediction-btn");
        const count = selectedBuildingGeoJSONs.length;

        btn.textContent = `Run ${count} Prediction${count === 1 ? "" : "s"}`;

        if (count > 0) {
            btn.style.backgroundColor = "#007bff";
            btn.style.color = "white";
            btn.style.cursor = "pointer";
            btn.disabled = false;
        } else {
            btn.style.backgroundColor = "#ccc";
            btn.style.color = "black";
            btn.style.cursor = "not-allowed";
            btn.disabled = true;
        }
    }
    updatePredictionButton(); // Initialize button state


    // --- Map Interaction ---
    map.on("click", function (e) {
        // Check if the Shift key was held down
        const multiSelect = e.originalEvent.shiftKey;
        handleMapInteraction(e.latlng, multiSelect);
    });

    async function handleMapInteraction(latlng, multiSelect) {
        // --- Clear previous selection only if NOT multi-select (Shift key is NOT held) ---
        if (!multiSelect) {
            selectedBuildingGeoJSONs = [];
            buildingMarkers.clearLayers(); // Clear all selected buildings
        }

        // --- Cancel any pending find_building request ---
        findBuildingController.abort();
        findBuildingController = new AbortController();
        const findBuildingSignal = findBuildingController.signal;

        // 2. Call backend to find building
        try {
            const response = await fetch("/api/find_building", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ lat: latlng.lat, lon: latlng.lng }),
                signal: findBuildingSignal, // --- Pass the abort signal
            });

            const data = await response.json();
            const newBuildingGeoJSON = data.building;

            // 3. Add to selection
            selectedBuildingGeoJSONs.push(newBuildingGeoJSON);

            // 4. Display found building
            const newBuildingLayer = L.geoJSON(newBuildingGeoJSON, {
                style: {
                    color: "#ff00ff", // Magenta for selected buildings
                    weight: 3,
                    opacity: 1,
                    fillOpacity: 0.3,
                },
            }).addTo(buildingMarkers); // Add to the feature group

            updatePredictionButton();

            // 7. Map view is NOT fitted to avoid jumpiness
        } catch (error) {
            // --- Check if the error was an intentional abort ---
            if (error.name === "AbortError") {
                console.log("Find building request was aborted.");
                return;
            }
        }
    }

    // --- Sequential Prediction Function for Multiple Buildings ---
    async function runAllPredictions() {
        if (selectedBuildingGeoJSONs.length === 0) return;

        // 1. Setup and clear
        const overlay = document.getElementById("loader-overlay");
        overlay.style.display = "flex";
        const loaderText = document.getElementById("loader-text");

        // Cancel any pending prediction request (just in case)
        runPredictionController.abort();
        runPredictionController = new AbortController();
        const runPredictionSignal = runPredictionController.signal;

        // Clear old prediction layers from map and control
        currentPredictionLayerControlEntries.forEach(layer => {
            layerControl.removeLayer(layer);
            map.removeLayer(layer); // Ensure all master groups are removed
        });
        currentPredictionLayerControlEntries = [];
        predictionLayerGroups = {};

        // Clear all building markers from the map
        buildingMarkers.clearLayers();

        let allBounds = []; // To collect bounds for final map fit

        // 2. Loop through all selected buildings
        try {
            for (let i = 0; i < selectedBuildingGeoJSONs.length; i++) {
                const buildingGeoJSON = selectedBuildingGeoJSONs[i];
                loaderText.textContent = `Running prediction ${i + 1} of ${
                    selectedBuildingGeoJSONs.length
                }...`;

                // 3. Call prediction API for the single building
                const response = await fetch("/api/predict", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ building_geojson: buildingGeoJSON }),
                    signal: runPredictionSignal,
                });

                if (!response.ok) {
                    const err = await response.json();
                    console.error(`Prediction ${i + 1} failed: ${err.message}`);
                    continue; // Continue to next building if one fails
                }

                const data = await response.json();

                // 4. Add new layers to the master LayerGroups
                const bounds = data.bounds; // [[miny, minx], [maxy, maxx]]
                allBounds.push(bounds);
                
                // Add all returned layers
                for (const key in data.layers) {
                    const url = data.layers[key];
                    
                    // Initialize the master LayerGroup if it doesn't exist
                    if (!predictionLayerGroups[key]) {
                        predictionLayerGroups[key] = L.layerGroup();
                    }

                    const newLayer = L.imageOverlay(url, bounds, {
                        opacity: key.includes("color") ? 1.0 : 0.8,
                        interactive: true,
                        className: "leaflet-overlay-pixelated",
                    });

                    // Add the new building-specific image overlay to its master group
                    predictionLayerGroups[key].addLayer(newLayer);
                }
            } // End of loop

            // 5. Update Layer Control (only once after the loop)
            let firstLayerKey = null;

            for (const key in predictionLayerGroups) {
                const layerGroup = predictionLayerGroups[key];
                
                // Clean up key name for display
                const displayName = key
                    .replace(/_/g, " ")
                    .replace(/\b\w/g, (c) => c.toUpperCase());
                
                layerControl.addOverlay(layerGroup, displayName);
                currentPredictionLayerControlEntries.push(layerGroup);

                // Set 'pv_probability' to be checked (added to map) by default
                if (key === 'pv_probability') {
                    layerGroup.addTo(map);
                    firstLayerKey = key; // Keep track for map fitting if needed
                }
            }

            // 6. Fit map to encompassing bounds of all predictions
            if (allBounds.length > 0) {
                // Calculate the union of all bounding boxes
                let minX = allBounds[0][0][1];
                let minY = allBounds[0][0][0];
                let maxX = allBounds[0][1][1];
                let maxY = allBounds[0][1][0];

                allBounds.forEach(b => {
                    minY = Math.min(minY, b[0][0]);
                    minX = Math.min(minX, b[0][1]);
                    maxY = Math.max(maxY, b[1][0]);
                    maxX = Math.max(maxX, b[1][1]);
                });

                const unifiedBounds = L.latLngBounds([
                    [minY, minX],
                    [maxY, maxX]
                ]);
                map.fitBounds(unifiedBounds);
            }

            // Clear selection state after successful prediction run
            selectedBuildingGeoJSONs = [];
            updatePredictionButton();
        } catch (error) {
            if (error.name === "AbortError") {
                console.log("Prediction run was aborted.");
                return;
            }
            console.error("Error running predictions:", error);
            alert(`Prediction Failed:\n${error.message}`);
        } finally {
            // This always runs, even if aborted
            overlay.style.display = "none";
            loaderText.textContent = "Running prediction..."; // Reset text
        }
    }
</script>
  </body>
</html>
