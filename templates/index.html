<!DOCTYPE html>
<html>
  <head>
    <title>Interactive PV Predictor</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"
    />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: Arial, sans-serif;
      }
      #map {
        width: 100%;
        height: 100%;
      }
      /* Style for the loading spinner */
      .loader {
        border: 5px solid #f3f3f3;
        border-top: 5px solid #3498db;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: auto;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      .leaflet-popup-content-wrapper {
        border-radius: 5px;
      }
      .leaflet-popup-content {
        text-align: center;
      }
      #run-prediction-btn {
        background-color: #007bff;
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
      }
      #run-prediction-btn:hover {
        background-color: #0056b3;
      }

      #loader-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.6);
        z-index: 10000;
        display: none;
        justify-content: center;
        align-items: center;
      }
      .loader-box {
        background: white;
        padding: 25px 40px;
        border-radius: 10px;
        text-align: center;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }
      #loader-text {
        font-weight: bold;
        font-size: 1.1em;
        margin-top: 15px;
      }
      .leaflet-overlay-pixelated {
        /* This is the magic property for modern browsers */
        image-rendering: pixelated;
        /* Fallback for Firefox */
        image-rendering: -moz-crisp-edges;
      }
    </style>
  </head>
  <body data-config='{{ config|tojson|safe }}'>
    <div id="loader-overlay">
      <div class="loader-box">
        <div class="loader"></div>
        <div id="loader-text">Running prediction...</div>
      </div>
    </div>

    <div id="map"></div>

    <script>
      // --- Pass Config from Flask ---
      const configJson = document.body.dataset.config;
      const APP_CONFIG = JSON.parse(configJson);

      // --- Map Initialization ---
      const map = L.map("map").setView([51.9607, 7.6261], 14);

      // --- Basemap Layers ---
      const osm = L.tileLayer(
        "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        {
          attribution:
            '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        }
      );

      const light = L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
        {
          attribution:
            '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
        }
      );

      const googleSatellite = L.tileLayer(
        "https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}",
        {
          attribution: "Google",
          name: "Google Satellite",
        }
      ).addTo(map); // Default

      const basemaps = {
        "Google Satellite": googleSatellite,
        OpenStreetMap: osm,
        "Light Basemap": light,
      };

      if (
        APP_CONFIG.planet_api_key &&
        APP_CONFIG.planet_api_key !== "YOUR_PLANET_API_KEY_HERE"
      ) {
        const planetTilesUrl = `https://tiles.planet.com/basemaps/v1/planet-tiles/global_monthly_2025_08_mosaic/gmap/{z}/{x}/{y}.png?api_key=${APP_CONFIG.planet_api_key}`;
        const planet = L.tileLayer(planetTilesUrl, {
          attribution: "Planet Labs",
        });
        basemaps["Planet Monthly"] = planet;
      }

      // --- Layer Control ---
      const overlayLayers = {};
      const layerControl = L.control
        .layers(basemaps, overlayLayers, {
          collapsed: false,
        })
        .addTo(map);

      // --- Geocoding Search ---
      L.Control.geocoder({
        defaultMarkGeocode: false,
      })
        .on("markgeocode", function (e) {
          const latlng = e.geocode.center;
          map.setView(latlng, 18);
          handleMapInteraction(latlng);
        })
        .addTo(map);

      // --- NEW CHANGE 1: Global Event Listener (Event Delegation) ---
      // This solves all race conditions for the "Run Prediction" button.
      // We attach ONE listener to the whole document.
      document.addEventListener("click", function (e) {
        // Check if the element that was clicked has the ID we're looking for
        if (e.target && e.target.id === "run-prediction-btn") {
          // We found it! Run the prediction.
          console.log("Global listener caught 'run-prediction-btn' click.");
          runPrediction();
        }
      });
      // --- END NEW CHANGE 1 ---

      // --- Global State Variables ---
      let currentMarker = null;
      let currentBuildingLayer = null;
      let currentPredictionLayers = [];
      let currentBuildingGeoJSON = null;

      // --- Abort Controllers for canceling requests ---
      let findBuildingController = new AbortController();
      let runPredictionController = new AbortController();

      // --- Map Interaction ---
      map.on("click", function (e) {
        handleMapInteraction(e.latlng);
      });

      async function handleMapInteraction(latlng) {
        // --- Cancel any pending find_building request ---
        findBuildingController.abort();
        findBuildingController = new AbortController();
        const findBuildingSignal = findBuildingController.signal;

        // 1. Clear old marker and building
        if (currentMarker) {
          map.removeLayer(currentMarker);
        }
        if (currentBuildingLayer) {
          map.removeLayer(currentBuildingLayer);
        }

        // 2. Add new marker
        currentMarker = L.marker(latlng).addTo(map);

        // 3. Show loading popup
        currentMarker
          .bindPopup("<b>Finding closest building...</b>")
          .openPopup();

        // 4. Call backend to find building
        try {
          const response = await fetch("/api/find_building", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ lat: latlng.lat, lon: latlng.lng }),
            signal: findBuildingSignal, // --- Pass the abort signal
          });

          if (!response.ok) {
            currentMarker.setPopupContent("<b>No building found.</b>");
            return;
          }

          const data = await response.json();
          currentBuildingGeoJSON = data.building;

          // 5. Display found building
          currentBuildingLayer = L.geoJSON(data.building, {
            style: {
              color: "#ffff00", // Yellow
              weight: 2,
              opacity: 1,
              fillOpacity: 0.3,
            },
          }).addTo(map);

          map.fitBounds(currentBuildingLayer.getBounds().pad(0.1));

          // 6. Update popup with "Run Prediction" button
          const popupContent = `
                    <b>Building found!</b><br>
                    Run prediction for this building?
                    <br><br>
                    <button id="run-prediction-btn">Run Prediction</button>
                `;

          // --- NEW CHANGE 2: Simplified Content Update ---
          // We just set the content. The global listener
          // (added above) will handle the click.
          currentMarker.setPopupContent(popupContent);
          // --- END NEW CHANGE 2 ---
        } catch (error) {
          // --- Check if the error was an intentional abort ---
          if (error.name === "AbortError") {
            console.log("Find building request was aborted.");
            return;
          }
          // Handle real errors
          console.error("Error finding building:", error);
          currentMarker.setPopupContent("<b>Error finding building.</b>");
        }
      }

      async function runPrediction() {
        if (!currentBuildingGeoJSON) return;

        // --- Cancel any pending prediction request ---
        runPredictionController.abort();
        runPredictionController = new AbortController();
        const runPredictionSignal = runPredictionController.signal;

        // Get and show the loader
        const overlay = document.getElementById("loader-overlay");
        overlay.style.display = "flex";

        if (currentMarker) {
          currentMarker.closePopup();
        }

        // 2. Clear old prediction layers
        currentPredictionLayers.forEach((layer) => {
          map.removeLayer(layer);
          layerControl.removeLayer(layer);
        });
        currentPredictionLayers = [];

        try {
          // 3. Call prediction API
          const response = await fetch("/api/predict", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ building_geojson: currentBuildingGeoJSON }),
            signal: runPredictionSignal, // --- Pass the abort signal
          });

          if (!response.ok) {
            const err = await response.json();
            throw new Error(err.message || "Prediction failed.");
          }

          const data = await response.json();

          // --- Remove the click marker ---
          if (currentMarker) {
            map.removeLayer(currentMarker);
            currentMarker = null; // Clear the reference
          }

          // --- Remove the yellow building polygon ---
          if (currentBuildingLayer) {
            map.removeLayer(currentBuildingLayer);
            currentBuildingLayer = null; // Clear the reference
          }

          // 4. Add new layers to map
          const bounds = data.bounds;

          if (data.layers.pv_probability) {
            const probLayer = L.imageOverlay(
              data.layers.pv_probability,
              bounds,
              {
                opacity: 0.8,
                interactive: true,
                className: "leaflet-overlay-pixelated",
              }
            ).addTo(map);
            layerControl.addOverlay(probLayer, "PV Probability");
            currentPredictionLayers.push(probLayer);
          }

          if (data.layers.dissimilarity_index) {
            const diLayer = L.imageOverlay(
              data.layers.dissimilarity_index,
              bounds,
              {
                opacity: 0.8,
                interactive: true,
                className: "leaflet-overlay-pixelated",
              }
            );
            layerControl.addOverlay(diLayer, "Dissimilarity Index");
            currentPredictionLayers.push(diLayer);
          }

          if (data.layers.local_point_density) {
            const lpdLayer = L.imageOverlay(
              data.layers.local_point_density,
              bounds,
              {
                opacity: 0.8,
                interactive: true,
                className: "leaflet-overlay-pixelated",
              }
            );
            layerControl.addOverlay(lpdLayer, "Local Point Density");
            currentPredictionLayers.push(lpdLayer);
          }

          if (data.layers.sentinel_true_color) {
            const sentinelLayer = L.imageOverlay(
              data.layers.sentinel_true_color,
              bounds,
              {
                opacity: 1.0,
                interactive: true,
                className: "leaflet-overlay-pixelated",
              }
            );
            layerControl.addOverlay(sentinelLayer, "Sentinel True Color");
            currentPredictionLayers.push(sentinelLayer);
          }

          // 5. Update map view
          map.fitBounds(bounds);
        } catch (error) {
          // --- Check for abort error ---
          if (error.name === "AbortError") {
            console.log("Prediction request was aborted.");
            return;
          }
          console.error("Error running prediction:", error);
          alert(`Prediction Failed:\n${error.message}`);
        } finally {
          // This always runs, even if aborted
          overlay.style.display = "none";
        }
      }
    </script>
  </body>
</html>
